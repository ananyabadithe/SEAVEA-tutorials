# Example FabSim3 user machine configuration
# Copy this file to:
#   FabSim3/fabsim/deploy/machines_user.yml
# Then edit the paths for your own machine.

default:
  local_results: /path/to/FabSim/results
  local_configs: /path/to/FabSim/config_files
  username: your_username

localhost:
  username: your_username
  cores: 1
  corespernode: 1
  cpuspertask: 1
  taskspernode: 1
  virtual_env_path: /path/to/FabSim3/VirtualEnv
  python3_command: /path/to/FabSim3/VirtualEnv/bin/python
  flee_location: /path/to/flee
  enable_template_cache: false
  template_cache_size: 2000

# Optional HPC example.
# Replace all placeholders before using.
archer2:
  username: your_archer2_username
  project: your_archer2_project_code
  flee_location: /work/path/to/flee
  virtual_env_path: /work/path/to/FabSim3/VirtualEnv
  python3_command: /work/path/to/FabSim3/VirtualEnv/bin/python
  cores: 4
  corespernode: 128
  cpuspertask: 1
  taskspernode: 4
